<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>GIF → WEBM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap');
:root{
  --bg:#000;
  --ink:#fff;
  --muted:#9a9a9a;
  --line:#fff;
  --line-soft:rgba(255,255,255,.16);
  --grid:rgba(255,255,255,.12);
  --accent:#fff;
  --bad:#ff6b5f;
  --pixel:"Press Start 2P","Courier New",monospace;
  --sans:"Inter",Arial,sans-serif;
  --max:1280px;
  --px:clamp(16px,4vw,44px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased}
body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at 52% 12%,#000 0%,rgba(0,0,0,.82) 42%,transparent 88%);z-index:0}
button,input{font:inherit}.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
header{width:min(var(--max),calc(100% - var(--px)*2));margin:0 auto;min-height:64px;display:flex;align-items:center;justify-content:space-between;gap:24px;background:#000}
.brand{font-family:var(--pixel);font-size:12px;line-height:1;letter-spacing:.02em}.headerNote{max-width:440px;margin:0;font-size:14px;line-height:1.4;color:var(--muted);text-align:right}
h1{width:min(var(--max),calc(100% - var(--px)*2));margin:0 auto;padding:64px 0 38px;font-family:var(--pixel);font-size:clamp(34px,6.5vw,82px);font-weight:400;line-height:1.08;letter-spacing:-.04em}
main{width:min(var(--max),calc(100% - var(--px)*2));margin:0 auto 48px;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,380px);gap:28px;align-items:start}.left,.right{display:flex;flex-direction:column;gap:18px}.right{position:sticky;top:18px}
.drop{position:relative;min-height:520px;border:2px dashed #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;cursor:pointer;background:rgba(0,0,0,.62);transition:.18s ease;overflow:hidden}
.drop:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}.drop:hover,.drop.drag{background:#fff;color:#000}.drop:hover em,.drop.drag em{color:#555}.drop>*{position:relative;z-index:1}
.drop strong{font-family:var(--pixel);font-size:clamp(28px,4.2vw,54px);font-weight:400;line-height:1.22;letter-spacing:-.035em}.drop span{margin-top:30px;font-family:var(--pixel);font-size:10px;line-height:1.55}.drop em{margin-top:12px;color:var(--muted);font-style:normal;font-size:14px;line-height:1.45}.drop .plus{width:72px;height:72px;margin-bottom:32px;border:1px solid currentColor;display:grid;place-items:center;font-family:var(--sans);font-size:48px;font-weight:300;line-height:1}
.list{display:none;border:1px solid #fff;border-top:0;max-height:280px;overflow:auto;background:#000}.item{display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:center;padding:14px;border-top:1px solid #fff}.thumb{width:64px;height:64px;object-fit:contain;background-image:linear-gradient(45deg,#202020 25%,transparent 25%),linear-gradient(-45deg,#202020 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#202020 75%),linear-gradient(-45deg,transparent 75%,#202020 75%);background-size:12px 12px;background-position:0 0,0 6px,6px -6px,-6px 0}.meta{min-width:0}.meta b,.meta small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta b{font-size:15px}.meta small{font-size:12px;color:var(--muted);margin-top:5px}.remove{border:1px solid #fff;background:#000;color:#fff;width:38px;height:38px;padding:0;cursor:pointer;font-size:24px}.remove:hover{background:#fff;color:#000}
.rule{border:1px solid #fff;background:#000;padding:24px}.rule b{display:block;font-family:var(--pixel);font-size:12px;line-height:1.45}.rule p{margin:16px 0 0;font-size:15px;line-height:1.5;color:#d8d8d8}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid #fff;background:#000}.facts div{padding:18px;border-right:1px solid #fff;border-bottom:1px solid #fff;font-size:12px;color:#d8d8d8;line-height:1.35}.facts div:nth-child(2n){border-right:0}.facts div:nth-last-child(-n+2){border-bottom:0}.facts b{display:block;font-family:var(--pixel);font-size:17px;line-height:1.2;font-weight:400;color:#fff;margin-bottom:10px;letter-spacing:-.03em}
.action{border:1px solid #fff;background:#000;color:#fff;padding:20px 16px;font-family:var(--pixel);font-size:10px;line-height:1.3;cursor:pointer}.action:hover:not(:disabled){background:#fff;color:#000}.action:disabled{opacity:.28;cursor:not-allowed}.secondary{background:#000;color:#fff}
.progress{display:none;border:1px solid #fff;background:#000;padding:18px}.progressTop{display:flex;justify-content:space-between;font-family:var(--pixel);font-size:9px;line-height:1.4;margin-bottom:12px}.track{height:8px;background:#222}.bar{width:0;height:100%;background:#fff;transition:width .15s}.log{font-size:11px;color:var(--muted);margin-top:10px;max-height:46px;overflow:hidden;word-break:break-all}.done{display:none;border:1px solid #fff;background:#000;padding:22px}.done strong{font-family:var(--pixel);font-size:24px;line-height:1.2;letter-spacing:-.03em}.done p{font-size:13px;line-height:1.45;margin:12px 0 0;color:var(--muted)}.statusBad{color:var(--bad)!important}
footer{width:min(var(--max),calc(100% - var(--px)*2));margin:auto auto 0;padding:18px 0 24px;border-top:1px solid #fff;display:flex;justify-content:space-between;font-family:var(--pixel);font-size:8px;line-height:1.4;color:#fff}
@media(max-width:900px){header{min-height:62px}.headerNote{display:none}h1{padding:42px 0 28px;font-size:clamp(34px,10vw,56px)}main{grid-template-columns:1fr;gap:18px}.right{position:static}.drop{min-height:54vh;padding:26px 18px}.drop strong{font-size:clamp(28px,9vw,46px)}.drop span{font-size:9px}.drop em{font-size:13px}.facts b{font-size:15px}footer{font-size:7px}}
@media(max-width:420px){:root{--px:16px}.brand{font-size:10px}.drop{min-height:50vh}.drop .plus{width:62px;height:62px;font-size:40px}.facts div{padding:15px 12px}}
</style>
</head>
<body>
<div class="app">
<header><div class="brand">DANYAPEZ / GIF → WEBM</div><p class="headerNote">Загрузи GIF. На выходе один ZIP с отдельными папками emoji и sticker.</p></header>
<h1>GIF → WEBM</h1>
<main>
<section class="left">
  <label class="drop" id="drop">
    <input id="input" type="file" accept="image/gif,.gif" multiple hidden>
    <div class="plus">+</div>
    <strong>Загрузить<br>GIF</strong>
    <span>Перетащи сюда или нажми для выбора</span>
    <em>С компьютера, из файлов или галереи iPhone · можно несколько</em>
  </label>
  <div class="list" id="list"></div>
</section>
<aside class="right">
    <div class="facts">
    <div><b>512 px</b>стикер</div><div><b>100×100</b>эмодзи</div>
    <div><b>VP9</b>WebM</div><div><b>≤256 КБ</b>автосжатие</div>
  </div>
  <button class="action" id="convert" disabled>Собрать ZIP</button>
  <div class="progress" id="progress"><div class="progressTop"><span id="status">Подготовка</span><span id="percent">0%</span></div><div class="track"><div class="bar" id="bar"></div></div><div class="log" id="log"></div></div>
  <div class="done" id="done"><strong>Готово</strong><p id="summary"></p></div>
  <button class="action secondary" id="clear" style="display:none">Очистить</button>
</aside>
</main>
<footer><span>GIF → WEBM</span><span>LOCAL CONVERTER / ZIP</span></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script type="module">
import { FFmpeg } from 'https://esm.sh/@ffmpeg/ffmpeg@0.12.15';
import { fetchFile, toBlobURL } from 'https://esm.sh/@ffmpeg/util@0.12.2';

const $=s=>document.querySelector(s), input=$('#input'),drop=$('#drop'),list=$('#list'),convert=$('#convert'),clear=$('#clear'),progress=$('#progress'),bar=$('#bar'),percent=$('#percent'),status=$('#status'),log=$('#log'),done=$('#done'),summary=$('#summary');
const MAX=256*1024, CORE='https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd';
let files=[],ffmpeg,loaded=false,lastLog='';
const size=n=>n<1024?`${n} Б`:`${(n/1024).toFixed(n<10240?1:0)} КБ`;
const clean=n=>(n.replace(/\.[^.]+$/,'').replace(/[^\p{L}\p{N}._-]+/gu,'_')||'telegram');
function setProgress(n,t){n=Math.max(0,Math.min(100,Math.round(n)));bar.style.width=n+'%';percent.textContent=n+'%';if(t)status.textContent=t}
function render(){list.innerHTML='';list.style.display=files.length?'block':'none';drop.style.minHeight=files.length?'180px':'';files.forEach((f,i)=>{const u=URL.createObjectURL(f),row=document.createElement('div');row.className='item';row.innerHTML=`<img class="thumb" src="${u}"><div class="meta"><b></b><small>${size(f.size)}</small></div><button class="remove" aria-label="Удалить">×</button>`;row.querySelector('b').textContent=f.name;row.querySelector('img').onload=()=>URL.revokeObjectURL(u);row.querySelector('.remove').onclick=()=>{files.splice(i,1);render()};list.append(row)});convert.disabled=!files.length;done.style.display='none';clear.style.display=files.length?'block':'none'}
function add(incoming){for(const f of incoming){if(f.type==='image/gif'||f.name.toLowerCase().endsWith('.gif'))files.push(f)}render()}
input.onchange=()=>{add(input.files);input.value=''};['dragenter','dragover'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>add(e.dataTransfer.files));clear.onclick=()=>{files=[];render();progress.style.display='none'};
async function load(){if(loaded)return;ffmpeg=new FFmpeg();ffmpeg.on('log',({message})=>{lastLog=message;log.textContent=message});await ffmpeg.load({coreURL:await toBlobURL(CORE+'/ffmpeg-core.js','text/javascript'),wasmURL:await toBlobURL(CORE+'/ffmpeg-core.wasm','application/wasm')});loaded=true}
async function rm(n){try{await ffmpeg.deleteFile(n)}catch{}}
function filter(kind){return kind==='sticker'?'scale=512:512:force_original_aspect_ratio=decrease:flags=lanczos,format=yuva420p':'scale=100:100:force_original_aspect_ratio=decrease:flags=lanczos,pad=100:100:(ow-iw)/2:(oh-ih)/2:color=black@0,format=yuva420p'}
async function encode(src,kind,onTry){const out=kind+'.webm',steps=[34,40,46,52,58,63],cpu=navigator.userAgent.includes('iPhone')?8:5;let data;for(let i=0;i<steps.length;i++){onTry(i,steps.length);await rm(out);const code=await ffmpeg.exec(['-i',src,'-t','3','-an','-vf',filter(kind),'-r','30','-c:v','libvpx-vp9','-pix_fmt','yuva420p','-auto-alt-ref','0','-deadline','good','-cpu-used',String(cpu),'-threads','1','-crf',String(steps[i]),'-b:v','0','-metadata:s:v:0','alpha_mode=1','-f','webm',out]);if(code!==0)throw Error(lastLog||'Ошибка FFmpeg');data=new Uint8Array(await ffmpeg.readFile(out));if(data.byteLength<=MAX)break}await rm(out);return data}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),30000)}
convert.onclick=async()=>{if(!files.length)return;convert.disabled=true;clear.disabled=true;done.style.display='none';progress.style.display='block';log.textContent='';setProgress(1,'Загрузка движка…');const zip=new JSZip(),emoji=zip.folder('emoji'),sticker=zip.folder('sticker');let warnings=0;try{await load();for(let i=0;i<files.length;i++){const f=files[i],src='input_'+i+'.gif',base=clean(f.name),portion=90/files.length,start=5+i*portion;setProgress(start,`${i+1}/${files.length} · ${f.name}`);await ffmpeg.writeFile(src,await fetchFile(f));const s=await encode(src,'sticker',(t,n)=>setProgress(start+portion*(.05+.4*t/n),`${i+1}/${files.length} · стикер`));const e=await encode(src,'emoji',(t,n)=>setProgress(start+portion*(.5+.4*t/n),`${i+1}/${files.length} · эмодзи`));sticker.file(base+'_sticker.webm',s);emoji.file(base+'_emoji.webm',e);if(s.byteLength>MAX||e.byteLength>MAX)warnings++;await rm(src)}setProgress(96,'Упаковка ZIP…');const blob=await zip.generateAsync({type:'blob',compression:'STORE'},m=>setProgress(96+m.percent*.04,'Упаковка ZIP…'));download(blob,'gif_webm.zip');setProgress(100,'ZIP сохранён');summary.textContent=`${files.length} GIF → ${files.length*2} файлов. Внутри папки emoji и sticker.${warnings?' Некоторые файлы больше 256 КБ — попробуй более короткую или простую GIF.':''}`;summary.className=warnings?'statusBad':'';done.style.display='block'}catch(e){console.error(e);status.textContent='Ошибка';log.textContent=e.message||String(e);alert('Не удалось обработать GIF. На iPhone лучше открыть страницу в Safari, освободить память и попробовать ещё раз.')}finally{convert.disabled=false;clear.disabled=false}};
</script>
</body>
</html>
