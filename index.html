
<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>GIF TO WEBM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');
:root{--bg:#000;--ink:#fff;--muted:#9a9a9a;--bad:#ff6b5f;--pixel:"Press Start 2P",monospace;--sans:"Inter",Arial,sans-serif;--pad:clamp(16px,4vw,50px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:var(--sans)}
button,input{font:inherit}
#input{display:none!important}
main{width:100%;max-width:1280px;margin:0 auto;padding:var(--pad);display:flex;flex-direction:column;gap:28px}
.drop{min-height:650px;border:2px dashed #fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:36px;cursor:pointer;background:#000;transition:.15s}
.drop:hover,.drop.drag{background:#fff;color:#000}
.drop strong{font-family:var(--pixel);font-size:clamp(34px,5.2vw,70px);font-weight:400;line-height:1.2;letter-spacing:-.04em;display:flex;align-items:center;justify-content:center;gap:.38em;white-space:nowrap}
.list{display:none;border:1px solid #fff;background:#000}
.item{display:grid;grid-template-columns:76px minmax(0,1fr) auto;gap:16px;align-items:center;padding:16px;border-top:1px solid #fff}
.preview{width:76px;height:76px;object-fit:contain;border:1px solid #fff;background-color:#111;background-image:linear-gradient(45deg,#242424 25%,transparent 25%),linear-gradient(-45deg,#242424 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#242424 75%),linear-gradient(-45deg,transparent 75%,#242424 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}
.item:first-child{border-top:0}
.meta b,.meta small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta b{font-size:15px}.meta small{font-size:12px;color:var(--muted);margin-top:6px}
.remove{border:1px solid #fff;background:#000;color:#fff;width:40px;height:40px;cursor:pointer;font-size:24px;align-self:start;transform:translateY(-3px);display:grid;place-items:center;line-height:1;padding:0}
.remove:hover{background:#fff;color:#000}
.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid #fff}
.facts div{min-height:124px;padding:22px;border-right:1px solid #fff;border-bottom:1px solid #fff;font-size:14px;color:#d8d8d8}
.facts div:nth-child(2n){border-right:0}.facts div:nth-last-child(-n+2){border-bottom:0}
.facts b{display:block;font-family:var(--pixel);font-size:clamp(17px,2vw,24px);font-weight:400;color:#fff;margin-bottom:14px;letter-spacing:-.03em}
.action{width:100%;border:1px solid #fff;background:#000;color:#fff;padding:24px 18px;font-family:var(--pixel);font-size:11px;cursor:pointer}
.action:hover:not(:disabled){background:#fff;color:#000}.action:disabled{opacity:.28;cursor:not-allowed}
.progress{display:none;border:1px solid #fff;padding:22px}
.progressTop{display:flex;justify-content:space-between;gap:20px;font-family:var(--pixel);font-size:10px;line-height:1.5;margin-bottom:16px}
.track{height:12px;background:#222}.bar{height:100%;width:0;background:#fff;transition:width .15s}
.log{font-size:12px;color:var(--muted);margin-top:14px;min-height:18px;word-break:break-word}
.done{display:none;border:1px solid #fff;padding:22px}.done strong{font-family:var(--pixel);font-size:22px}.done p{margin:14px 0 0;color:var(--muted);line-height:1.5}
.statusBad{color:var(--bad)!important}
@media(max-width:700px){main{padding:16px;gap:18px}.drop{min-height:62vh;padding:20px}.drop strong{font-size:clamp(28px,8vw,46px);gap:.32em}.facts div{min-height:116px;padding:18px 16px}.item{grid-template-columns:64px minmax(0,1fr) auto;gap:12px}.preview{width:64px;height:64px}}
</style>
</head>
<body>
<main>
<label class="drop" id="drop"><input id="input" type="file" accept="image/gif,.gif" multiple><strong><span>GIF</span><span>TO</span><span>WEBM</span></strong></label>
<div class="list" id="list"></div>
<div class="facts"><div><b>512 px</b>стикер</div><div><b>100×100</b>эмодзи</div><div><b>VP9</b>WebM</div><div><b>≤256 КБ</b>автосжатие</div></div>
<button class="action" id="convert" disabled>Собрать ZIP</button>
<div class="progress" id="progress"><div class="progressTop"><span id="status">Подготовка</span><span id="percent">0%</span></div><div class="track"><div class="bar" id="bar"></div></div><div class="log" id="log"></div></div>
<div class="done" id="done"><strong>Готово</strong><p id="summary"></p></div>
<button class="action" id="clear" style="display:none">Очистить</button>
</main>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
const $=s=>document.querySelector(s),input=$('#input'),drop=$('#drop'),list=$('#list'),convert=$('#convert'),clear=$('#clear'),progress=$('#progress'),bar=$('#bar'),percent=$('#percent'),status=$('#status'),log=$('#log'),done=$('#done'),summary=$('#summary');
const MAX=256*1024;let files=[],ffmpeg=null,loaded=false,logs=[];
const size=n=>n<1024?`${n} Б`:`${(n/1024).toFixed(n<10240?1:0)} КБ`;
const clean=n=>(n.replace(/\.[^.]+$/,'').replace(/[^\p{L}\p{N}._-]+/gu,'_')||'file');
function setProgress(n,t){n=Math.max(0,Math.min(100,Math.round(n)));bar.style.width=n+'%';percent.textContent=n+'%';if(t)status.textContent=t}
function render(){
 list.innerHTML='';list.style.display=files.length?'block':'none';drop.style.minHeight=files.length?'260px':'';
 files.forEach((f,i)=>{
   const row=document.createElement('div');row.className='item';
   const url=URL.createObjectURL(f);
   row.innerHTML=`<img class="preview" alt=""><div class="meta"><b></b><small>${size(f.size)}</small></div><button class="remove" aria-label="Удалить">×</button>`;
   const img=row.querySelector('.preview');img.src=url;img.onload=()=>URL.revokeObjectURL(url);img.onerror=()=>URL.revokeObjectURL(url);
   row.querySelector('b').textContent=f.name;
   row.querySelector('.remove').onclick=e=>{e.preventDefault();files.splice(i,1);render()};list.append(row)
 });
 convert.disabled=!files.length;done.style.display='none';clear.style.display=files.length?'block':'none'
}
function add(incoming){for(const f of incoming)if(f.type==='image/gif'||f.name.toLowerCase().endsWith('.gif'))files.push(f);render()}
input.onchange=()=>{add(input.files);input.value=''};
['dragenter','dragover'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.add('drag')}));
['dragleave','drop'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.remove('drag')}));
drop.addEventListener('drop',e=>add(e.dataTransfer.files));
clear.onclick=()=>{files=[];render();progress.style.display='none'};
function timeout(p,ms,msg){return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg)),ms))])}
async function load(){
 if(loaded)return;
 if(!window.FFmpeg?.createFFmpeg)throw new Error('Не загрузился модуль FFmpeg. Открой страницу при включённом интернете.');
 const {createFFmpeg}=window.FFmpeg;
 ffmpeg=createFFmpeg({
   log:true,
   corePath:'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
   logger:({message})=>{if(message){logs.push(message);if(logs.length>30)logs.shift();log.textContent=message}}
 });
 setProgress(2,'Загрузка конвертера…');
 await timeout(ffmpeg.load(),180000,'FFmpeg не загрузился за 3 минуты. Проверь интернет, отключи блокировщик и обнови страницу.');
 loaded=true;setProgress(5,'Конвертер загружен');
}
function rm(n){try{ffmpeg.FS('unlink',n)}catch{}}
function filter(kind){return kind==='sticker'?'scale=512:512:force_original_aspect_ratio=decrease:flags=lanczos,format=yuva420p':'scale=100:100:force_original_aspect_ratio=decrease:flags=lanczos,pad=100:100:(ow-iw)/2:(oh-ih)/2:color=black@0,format=yuva420p'}
async function encode(src,kind,onTry){
 const out=kind+'.webm',steps=[34,40,46,52,58,64,70];let data=null;
 for(let i=0;i<steps.length;i++){
   onTry(i,steps.length);rm(out);logs=[];
   try{
     await timeout(ffmpeg.run('-i',src,'-t','3','-an','-vf',filter(kind),'-r','30','-c:v','libvpx-vp9','-pix_fmt','yuva420p','-auto-alt-ref','0','-deadline','good','-cpu-used','5','-crf',String(steps[i]),'-b:v','0','-metadata:s:v:0','alpha_mode=1','-f','webm',out),120000,'Конвертация одного файла заняла слишком долго.');
   }catch(err){throw new Error('FFmpeg не смог обработать GIF. '+(logs.slice(-5).join(' | ')||err.message));}
   try{data=ffmpeg.FS('readFile',out)}catch{throw new Error('WebM не создался. '+logs.slice(-5).join(' | '))}
   if(data.byteLength<=MAX)break;
 }
 if(!data)throw new Error('Не удалось получить WebM.');
 const copy=new Uint8Array(data);rm(out);return copy;
}
function download(blob,name){const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000)}
convert.onclick=async()=>{
 if(!files.length)return;convert.disabled=true;clear.disabled=true;done.style.display='none';progress.style.display='block';log.textContent='';setProgress(1,'Загрузка конвертера…');
 try{
   if(!window.JSZip)throw new Error('Не загрузился модуль ZIP. Обнови страницу при включённом интернете.');
   await load();
   const zip=new JSZip(),emoji=zip.folder('emoji'),sticker=zip.folder('sticker');let warnings=0;
   for(let i=0;i<files.length;i++){
     const f=files[i],src='input_'+i+'.gif',base=clean(f.name),portion=88/files.length,start=6+i*portion;
     setProgress(start,`${i+1}/${files.length} · ${f.name}`);
     ffmpeg.FS('writeFile',src,new Uint8Array(await f.arrayBuffer()));
     const s=await encode(src,'sticker',(t,n)=>setProgress(start+portion*(.08+.38*t/n),`${i+1}/${files.length} · стикер`));
     const e=await encode(src,'emoji',(t,n)=>setProgress(start+portion*(.52+.38*t/n),`${i+1}/${files.length} · эмодзи`));
     sticker.file(base+'_sticker.webm',s);emoji.file(base+'_emoji.webm',e);if(s.byteLength>MAX||e.byteLength>MAX)warnings++;rm(src);
   }
   setProgress(96,'Упаковка ZIP…');
   const blob=await zip.generateAsync({type:'blob',compression:'STORE'},m=>setProgress(96+m.percent*.04,'Упаковка ZIP…'));
   download(blob,'gif_webm.zip');setProgress(100,'ZIP сохранён');summary.textContent=`${files.length} GIF → ${files.length*2} WebM.${warnings?' Некоторые файлы больше 256 КБ.':''}`;summary.className=warnings?'statusBad':'';done.style.display='block';
 }catch(e){console.error(e);status.textContent='Ошибка';log.textContent=e?.message||String(e);alert(log.textContent)}finally{convert.disabled=false;clear.disabled=false}
};
</script>
</body></html>
