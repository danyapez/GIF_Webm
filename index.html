<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>GIF TO WEBM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&display=swap');
:root{
  --bg:#000;
  --ink:#fff;
  --muted:#9a9a9a;
  --line:#fff;
  --line-soft:rgba(255,255,255,.16);
  --grid:rgba(255,255,255,.12);
  --accent:#fff;
  --bad:#ff6b5f;
  --pixel:"Press Start 2P","Courier New",monospace;
  --sans:"Inter",Arial,sans-serif;
  --max:1280px;
  --px:clamp(16px,4vw,44px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased}
button,input{font:inherit}#input{display:none!important;width:0!important;height:0!important;opacity:0!important;position:absolute!important;pointer-events:none!important;appearance:none!important;-webkit-appearance:none!important}.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
main{width:min(var(--max),calc(100% - var(--px)*2));margin:48px auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,380px);gap:28px;align-items:start}.left,.right{display:flex;flex-direction:column;gap:18px}.right{position:sticky;top:18px}
.drop{position:relative;min-height:520px;border:2px dashed #fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px;cursor:pointer;background:rgba(0,0,0,.62);transition:.18s ease;overflow:hidden}
.drop:hover,.drop.drag{background:#fff;color:#000}.drop:hover em,.drop.drag em{color:#555}.drop>*{position:relative;z-index:1}
.drop::before,.drop::after,.drop strong::before,.drop strong::after,.drop strong span::before,.drop strong span::after{content:none!important;display:none!important}.drop strong{font-family:var(--pixel);font-size:clamp(28px,4.2vw,54px);font-weight:400;line-height:1.22;letter-spacing:-.035em;display:flex;align-items:center;justify-content:center;gap:.55em}.drop strong span{display:block;margin:0!important;font:inherit!important;line-height:inherit!important}.list{display:none;border:1px solid #fff;border-top:0;max-height:280px;overflow:auto;background:#000}.item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;padding:14px;border-top:1px solid #fff}.meta{min-width:0}.meta b,.meta small{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta b{font-size:15px}.meta small{font-size:12px;color:var(--muted);margin-top:5px}.remove{border:1px solid #fff;background:#000;color:#fff;width:38px;height:38px;padding:0;cursor:pointer;font-size:24px}.remove:hover{background:#fff;color:#000}
.rule{border:1px solid #fff;background:#000;padding:24px}.rule b{display:block;font-family:var(--pixel);font-size:12px;line-height:1.45}.rule p{margin:16px 0 0;font-size:15px;line-height:1.5;color:#d8d8d8}.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid #fff;background:#000}.facts div{padding:18px;border-right:1px solid #fff;border-bottom:1px solid #fff;font-size:12px;color:#d8d8d8;line-height:1.35}.facts div:nth-child(2n){border-right:0}.facts div:nth-last-child(-n+2){border-bottom:0}.facts b{display:block;font-family:var(--pixel);font-size:17px;line-height:1.2;font-weight:400;color:#fff;margin-bottom:10px;letter-spacing:-.03em}
.action{border:1px solid #fff;background:#000;color:#fff;padding:20px 16px;font-family:var(--pixel);font-size:10px;line-height:1.3;cursor:pointer}.action:hover:not(:disabled){background:#fff;color:#000}.action:disabled{opacity:.28;cursor:not-allowed}.secondary{background:#000;color:#fff}
.progress{display:none;border:1px solid #fff;background:#000;padding:18px}.progressTop{display:flex;justify-content:space-between;font-family:var(--pixel);font-size:9px;line-height:1.4;margin-bottom:12px}.track{height:8px;background:#222}.bar{width:0;height:100%;background:#fff;transition:width .15s}.log{font-size:11px;color:var(--muted);margin-top:10px;max-height:46px;overflow:hidden;word-break:break-all}.done{display:none;border:1px solid #fff;background:#000;padding:22px}.done strong{font-family:var(--pixel);font-size:24px;line-height:1.2;letter-spacing:-.03em}.done p{font-size:13px;line-height:1.45;margin:12px 0 0;color:var(--muted)}.statusBad{color:var(--bad)!important}
@media(max-width:900px){main{grid-template-columns:1fr;gap:18px;margin:24px auto 36px}.right{position:static}.drop{min-height:54vh;padding:26px 18px}.drop strong{font-size:clamp(28px,9vw,46px)}.drop span{font-size:9px}.facts b{font-size:15px}}
@media(max-width:420px){:root{--px:16px}.drop{min-height:50vh}.facts div{padding:15px 12px}}
</style>
</head>
<body>
<div class="app">
<main>
<section class="left">
  <label class="drop" id="drop">
    <input id="input" type="file" accept="image/gif,.gif" multiple hidden>
    <strong><span>GIF</span><span>TO</span><span>WEBM</span></strong>
  </label>
  <div class="list" id="list"></div>
</section>
<aside class="right">
    <div class="facts">
    <div><b>512 px</b>стикер</div><div><b>100×100</b>эмодзи</div>
    <div><b>VP9</b>WebM</div><div><b>≤256 КБ</b>автосжатие</div>
  </div>
  <button class="action" id="convert" disabled>Собрать ZIP</button>
  <div class="progress" id="progress"><div class="progressTop"><span id="status">Подготовка</span><span id="percent">0%</span></div><div class="track"><div class="bar" id="bar"></div></div><div class="log" id="log"></div></div>
  <div class="done" id="done"><strong>Готово</strong><p id="summary"></p></div>
  <button class="action secondary" id="clear" style="display:none">Очистить</button>
</aside>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script type="module">
import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js';
import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/esm/index.js';

const $=s=>document.querySelector(s), input=$('#input'),drop=$('#drop'),list=$('#list'),convert=$('#convert'),clear=$('#clear'),progress=$('#progress'),bar=$('#bar'),percent=$('#percent'),status=$('#status'),log=$('#log'),done=$('#done'),summary=$('#summary');
const MAX=256*1024;
let files=[],ffmpeg=null,loaded=false,lastLog='';
const size=n=>n<1024?`${n} Б`:`${(n/1024).toFixed(n<10240?1:0)} КБ`;
const clean=n=>(n.replace(/\.[^.]+$/,'').replace(/[^\p{L}\p{N}._-]+/gu,'_')||'file');
function setProgress(n,t){n=Math.max(0,Math.min(100,Math.round(n)));bar.style.width=n+'%';percent.textContent=n+'%';if(t)status.textContent=t}
function render(){list.innerHTML='';list.style.display=files.length?'block':'none';drop.style.minHeight=files.length?'180px':'';files.forEach((f,i)=>{const row=document.createElement('div');row.className='item';row.innerHTML=`<div class="meta"><b></b><small>${size(f.size)}</small></div><button class="remove" aria-label="Удалить">×</button>`;row.querySelector('b').textContent=f.name;row.querySelector('.remove').onclick=e=>{e.preventDefault();files.splice(i,1);render()};list.append(row)});convert.disabled=!files.length;done.style.display='none';clear.style.display=files.length?'block':'none'}
function add(incoming){for(const f of incoming){if(f.type==='image/gif'||f.name.toLowerCase().endsWith('.gif'))files.push(f)}render()}
input.onchange=()=>{add(input.files);input.value=''};['dragenter','dragover'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(e=>drop.addEventListener(e,x=>{x.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>add(e.dataTransfer.files));clear.onclick=()=>{files=[];render();progress.style.display='none'};

async function load(){
  if(loaded)return;
  ffmpeg=new FFmpeg();
  ffmpeg.on('log',({message})=>{lastLog=message;log.textContent=message||''});
  const base='https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/esm';
  const coreURL=await toBlobURL(`${base}/ffmpeg-core.js`,'text/javascript');
  const wasmURL=await toBlobURL(`${base}/ffmpeg-core.wasm`,'application/wasm');
  const classWorkerURL=await toBlobURL('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm/worker.js','text/javascript');
  await ffmpeg.load({coreURL,wasmURL,classWorkerURL});
  loaded=true;
}
async function rm(n){try{await ffmpeg.deleteFile(n)}catch(e){}}
function filter(kind){return kind==='sticker'?'scale=512:512:force_original_aspect_ratio=decrease:flags=lanczos,format=yuva420p':'scale=100:100:force_original_aspect_ratio=decrease:flags=lanczos,pad=100:100:(ow-iw)/2:(oh-ih)/2:color=black@0,format=yuva420p'}
async function encode(src,kind,onTry){
  const out=kind+'.webm',steps=[34,40,46,52,58,63];
  let data;
  for(let i=0;i<steps.length;i++){
    onTry(i,steps.length);await rm(out);
    const code=await ffmpeg.exec(['-i',src,'-t','3','-an','-vf',filter(kind),'-r','30','-c:v','libvpx-vp9','-pix_fmt','yuva420p','-auto-alt-ref','0','-deadline','good','-cpu-used','5','-crf',String(steps[i]),'-b:v','0','-metadata:s:v:0','alpha_mode=1','-f','webm',out]);
    if(code!==0) throw new Error('FFmpeg не смог обработать GIF. '+lastLog);
    data=await ffmpeg.readFile(out);
    if(data.byteLength<=MAX)break;
  }
  const copy=new Uint8Array(data);await rm(out);return copy;
}
function download(blob,name){const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;document.body.append(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),30000)}
convert.onclick=async()=>{
  if(!files.length)return;convert.disabled=true;clear.disabled=true;done.style.display='none';progress.style.display='block';log.textContent='';setProgress(1,'Загрузка конвертера…');
  const zip=new JSZip(),emoji=zip.folder('emoji'),sticker=zip.folder('sticker');let warnings=0;
  try{
    await load();
    for(let i=0;i<files.length;i++){
      const f=files[i],src='input_'+i+'.gif',base=clean(f.name),portion=90/files.length,start=5+i*portion;
      setProgress(start,`${i+1}/${files.length} · ${f.name}`);
      await ffmpeg.writeFile(src,await fetchFile(f));
      const s=await encode(src,'sticker',(t,n)=>setProgress(start+portion*(.05+.4*t/n),`${i+1}/${files.length} · стикер`));
      const e=await encode(src,'emoji',(t,n)=>setProgress(start+portion*(.5+.4*t/n),`${i+1}/${files.length} · эмодзи`));
      sticker.file(base+'_sticker.webm',s);emoji.file(base+'_emoji.webm',e);
      if(s.byteLength>MAX||e.byteLength>MAX)warnings++;await rm(src);
    }
    setProgress(96,'Упаковка ZIP…');
    const blob=await zip.generateAsync({type:'blob',compression:'STORE'},m=>setProgress(96+m.percent*.04,'Упаковка ZIP…'));
    download(blob,'gif_webm.zip');setProgress(100,'ZIP сохранён');
    summary.textContent=`${files.length} GIF TO ${files.length*2} файлов. Внутри папки emoji и sticker.${warnings?' Некоторые файлы больше 256 КБ.':''}`;
    summary.className=warnings?'statusBad':'';done.style.display='block';
  }catch(e){
    console.error(e);status.textContent='Ошибка';log.textContent=e.message||lastLog||String(e);
    alert('Конвертация не запустилась. Открой страницу через GitHub Pages, проверь интернет и попробуй снова в Chrome или Safari.');
  }finally{convert.disabled=false;clear.disabled=false}
};
</script>
</body>
</html>
